# Jekyll configuration for OMG Entertainment Group
# GitHub Pages with clean URLs (no .html extension)
baseurl: "/url-html"
title: OMG Entertainment Group
description: Transform Every Event Into an Unforgettable Experience
url: "https://codevodka.github.io" # Update this to your GitHub Pages URL, e.g. https://username.github.io

# Clean URLs - removes .html extension
permalink: pretty

# Exclude files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - .gitignore

plugins:
  - jekyll-seo-tag                   # Auto-generates SEO meta tags
  - jekyll-sitemap                   # Auto-generates sitemap.xml
  # - jekyll-feed                      # Auto-generates RSS feed

# Custom site-wide variables
email: info@OMGgroup.com.au   # <a href="mailto:{{ site.email }}">{{ site.email }}</a>
phone: "1300 300 664"
social:
  facebook: "#"
  instagram: "#"
